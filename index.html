<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>?????? - ????????</title>
  <script src="/socket.io.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }
    .container { max-width: 400px; margin: 0 auto; }
    .header { text-align: center; color: white; margin-bottom: 20px; }
    .header h1 { font-size: 28px; font-weight: bold; text-shadow: 0 2px 4px rgba(0,0,0,0.2); }
    .header p { font-size: 14px; opacity: 0.8; margin-top: 5px; }
    .tabs { display: flex; gap: 10px; margin-bottom: 15px; }
    .tab { flex: 1; padding: 12px; background: rgba(255,255,255,0.2); border: none; border-radius: 12px; color: white; font-weight: 600; cursor: pointer; transition: all 0.3s; }
    .tab.active { background: rgba(255,255,255,0.95); color: #6366f1; }
    .page { display: none; }
    .page.active { display: block; }
    .card { background: rgba(255,255,255,0.95); border-radius: 20px; padding: 20px; margin-bottom: 15px; }
    .card-title { font-size: 16px; font-weight: 600; color: #1f2937; margin-bottom: 15px; }
    .btn { background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%); color: white; border: none; padding: 12px 24px; border-radius: 12px; font-weight: 600; cursor: pointer; }
    .btn-success { background: linear-gradient(135deg, #10b981 0%, #059669 100%); }
    .btn:disabled { background: #9ca3af; cursor: not-allowed; }
    .btn-large { width: 100%; padding: 16px; font-size: 18px; }
    .input-group { display: flex; gap: 10px; margin-bottom: 10px; }
    .input { flex: 1; padding: 10px 14px; border: 2px solid #e5e7eb; border-radius: 12px; font-size: 14px; outline: none; }
    .input:focus { border-color: #6366f1; }
    .slider { width: 100%; height: 6px; background: #e5e7eb; border-radius: 3px; margin: 15px 0; }
    .slider::-webkit-slider-thumb { width: 20px; height: 20px; background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%); border-radius: 50%; cursor: pointer; }
    .fixed-row { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
    .fixed-badge { width: 40px; height: 40px; background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%); border-radius: 12px; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; font-size: 18px; }
    .user-item { display: flex; align-items: center; justify-content: space-between; padding: 10px 12px; background: #f3f4f6; border-radius: 10px; margin-bottom: 8px; }
    .result-item { display: flex; align-items: center; gap: 12px; padding: 12px; background: #f9fafb; border-radius: 12px; margin-bottom: 8px; }
    .result-item.fixed { background: linear-gradient(135deg, #fffbeb 0%, #fef3c7 0%); }
    .result-badge { width: 40px; height: 40px; background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%); border-radius: 12px; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; font-size: 18px; }
    .result-item.fixed .result-badge { background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%); }
    .empty-state { text-align: center; padding: 30px 0; }
    .empty-state .icon { width: 64px; height: 64px; background: #f3f4f6; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 15px; font-size: 32px; }
    .progress-bar { width: 100%; height: 8px; background: #e5e7eb; border-radius: 4px; overflow: hidden; margin: 15px 0; }
    .progress-fill { height: 100%; background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%); }
    .count-badge { background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%); color: white; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; }
    .qr-section { text-align: center; padding: 20px; background: #f9fafb; border-radius: 12px; margin-top: 15px; }
    .qr-code { width: 150px; height: 150px; margin: 0 auto 15px; background: white; padding: 10px; border-radius: 12px; }
    .qr-code img { width: 100%; height: 100%; }
    .share-link { display: flex; gap: 10px; align-items: center; margin-top: 10px; }
    .share-link input { flex: 1; padding: 10px; border: 1px solid #e5e7eb; border-radius: 8px; font-size: 12px; }
    .copy-btn { padding: 10px 15px; background: #6366f1; color: white; border: none; border-radius: 8px; cursor: pointer; }
    .animate-spin { animation: spin 1s linear infinite; }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    .scrollable { max-height: 180px; overflow-y: auto; }
    .loading { text-align: center; padding: 50px 20px; color: white; }
    .status-card { text-align: center; padding: 30px 20px; }
    .success-card { background: linear-gradient(135deg, #ecfdf5 0%, #d1fae5 100%); border: 2px solid #10b981; }
    .admin-badge { background: #ef4444; color: white; padding: 2px 8px; border-radius: 4px; font-size: 10px; margin-left: 8px; }
  </style>
</head>
<body>
  <div id="loadingPage" class="loading">
    <div>?????????...</div>
    <p>?????????...</p>
  </div>

  <div id="adminPage" class="container" style="display: none;">
    <div class="header">
      <h1>??????</h1>
      <p>??????????·Ú</p>
    </div>

    <div class="tabs">
      <button class="tab active" onclick="switchTab('settings')">????</button>
      <button class="tab" onclick="switchTab('draw')">???</button>
    </div>

    <div id="settingsPage" class="page active">
      <div class="card">
        <div class="card-title">??????</div>
        <div style="display: flex; align-items: center; gap: 10px;">
          <span style="color: #6b7280;">??¦¶??1 -</span>
          <input type="number" id="maxNumber" value="20" min="2" max="50" style="width: 80px; text-align: center;">
          <button onclick="updateMaxNumber()" class="btn">???</button>
        </div>
        <input type="range" id="maxSlider" min="2" max="50" value="20" class="slider" oninput="syncSlider()">
      </div>

      <div class="card">
        <div class="card-title">???????</div>
        <p style="font-size: 12px; color: #6b7280; margin-bottom: 12px;">????????????????????</p>
        <div class="fixed-row">
          <div class="fixed-badge">1</div>
          <input type="text" id="fixed1" placeholder="1?????" style="flex: 1; padding: 10px; border-radius: 12px; border: 2px solid #fef3c7;">
        </div>
        <div class="fixed-row">
          <div class="fixed-badge">2</div>
          <input type="text" id="fixed2" placeholder="2?????" style="flex: 1; padding: 10px; border-radius: 12px; border: 2px solid #fef3c7;">
        </div>
        <button onclick="saveSettings()" class="btn" style="width: 100%; margin-top: 10px;">????????</button>
      </div>

      <div class="card">
        <div class="card-title">????????</div>
        <div class="qr-section">
          <div class="qr-code" id="qrCode"></div>
          <div class="share-link">
            <input type="text" id="shareLink" readonly>
            <button class="copy-btn" onclick="copyLink()">????</button>
          </div>
        </div>
      </div>
    </div>

    <div id="drawPage" class="page">
      <div class="card">
        <div class="card-title">??????? <span class="count-badge" id="userCount">0 / 20</span></div>
        <div style="display: flex; justify-content: space-between; padding: 10px; background: #f3f4f6; border-radius: 10px;">
          <span style="color: #6b7280;">??????</span>
          <span id="displayMaxNumber" style="font-weight: 600; color: #6366f1;">20</span>
        </div>
      </div>

      <div class="card">
        <div class="card-title">???????</div>
        <div class="input-group">
          <input type="text" id="userInput" placeholder="?????????" class="input">
          <button onclick="addUser()" class="btn">+ ????</button>
        </div>
        <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width: 0%;"></div></div>
        <p style="text-align: center; color: #6b7280; margin-bottom: 15px;" id="progressText">???? 20 ?????</p>
        <div id="userList" class="scrollable"></div>
      </div>

      <div class="card" style="padding: 0;">
        <button onclick="draw()" id="drawBtn" class="btn btn-large" disabled><span>???? 20 ?????</span></button>
      </div>

      <div class="card">
        <div class="card-title">??????</div>
        <div id="resultList">
          <div class="empty-state"><div class="icon">???</div><p>??????????????</p></div>
        </div>
      </div>
    </div>
  </div>

  <div id="joinPage" class="container" style="display: none;">
    <div class="header">
      <h1>??????</h1>
      <p>????????????</p>
    </div>

    <div class="card">
      <div class="status-card">
        <div id="statusIcon"></div>
        <div style="font-size: 20px; font-weight: 600; margin-bottom: 10px;" id="statusTitle">?????????</div>
        <div style="font-size: 14px; color: #6b7280;" id="statusDesc">???????????????</div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">?????? <span class="count-badge" id="joinUserCount">0 / 20</span></div>
      <div class="progress-bar"><div class="progress-fill" id="joinProgressFill" style="width: 0%;"></div></div>
      <p style="text-align: center; color: #6b7280; margin-bottom: 15px;" id="joinProgressText">????????????...</p>
      <div id="joinUserList" class="scrollable"></div>
    </div>

    <div class="card" id="joinForm">
      <div class="card-title">????????</div>
      <input type="text" id="joinUserName" placeholder="????????????" style="width: 100%; padding: 14px; border-radius: 12px; text-align: center; margin-bottom: 15px;">
      <button onclick="joinDrawing()" id="joinBtn" class="btn btn-success btn-large">??????</button>
    </div>

    <div class="card success-card" id="joinSuccessCard" style="display: none;">
      <div class="status-card">
        <div></div>
        <div style="font-size: 20px; font-weight: 600; margin-bottom: 10px;" id="joinWelcomeText">?????</div>
        <div style="font-size: 14px; color: #6b7280;">????????????</div>
      </div>
    </div>
  </div>

  <script>
    const socket = io({ transports: ['websocket', 'polling'] });

    let maxNumber = 20;
    let fixedUsers = { '1': '', '2': '' };
    let users = [];
    let results = [];
    let sessionId = '';
    let myName = '';
    let isJoined = false;
    let isAdmin = true;

    socket.on('connect', function() {
      console.log('WebSocket??????');
      init();
    });

    socket.on('connect_error', function(error) {
      console.error('WebSocket???????:', error);
      document.getElementById('loadingPage').innerHTML = '<div>???????</div><p>????????????????</p><button onclick="window.location.reload()" class="btn btn-large" style="margin-top: 20px;">????</button>';
    });

    socket.on('disconnect', function(reason) {
      console.log('WebSocket???????:', reason);
      if (reason === 'io server disconnect') {
        alert('?????????????');
      }
    });

    function init() {
      const params = new URLSearchParams(window.location.search);
      const joinId = params.get('join');
      
      if (joinId) {
        isAdmin = false;
        sessionId = joinId;
        socket.emit('joinSession', sessionId);
      } else {
        isAdmin = true;
        sessionId = 'draw_' + Date.now().toString(36) + Math.random().toString(36).substr(2, 9);
        socket.emit('createSession', sessionId);
      }
    }

    socket.on('sessionData', function(data) {
      if (data) {
        maxNumber = data.maxNumber || 20;
        fixedUsers = data.fixedUsers || { '1': '', '2': '' };
        users = data.users || [];
        results = data.results || [];
        
        if (isAdmin) {
          initAdminUI();
        } else {
          showJoinPage();
          updateJoinUI();
        }
      }
    });

    function saveSettings() {
      const settings = {
        maxNumber: parseInt(document.getElementById('maxNumber').value) || 20,
        fixedUsers: {
          '1': document.getElementById('fixed1').value.trim(),
          '2': document.getElementById('fixed2').value.trim()
        }
      };
      socket.emit('updateSettings', { sessionId: sessionId, settings: settings });
      alert('????????—ž');
    }

    function addUser() {
      const input = document.getElementById('userInput');
      const name = input.value.trim();
      if (!name) return;
      if (users.some(function(u) { return u.name === name; })) { alert('??????????'); return; }
      
      const user = { id: Date.now().toString(), name: name, isAdmin: true };
      socket.emit('addUser', { sessionId: sessionId, user: user });
      input.value = '';
    }

    function draw() {
      socket.emit('draw', sessionId);
      const btn = document.getElementById('drawBtn');
      btn.innerHTML = '<span class="animate-spin">?????...</span>';
      btn.disabled = true;
    }

    function joinDrawing() {
      const name = document.getElementById('joinUserName').value.trim();
      if (!name) { alert('??????????????'); return; }
      if (users.some(function(u) { return u.name === name; })) { alert('??????????'); return; }
      
      const user = { id: Date.now().toString(), name: name, isAdmin: false };
      socket.emit('addUser', { sessionId: sessionId, user: user });
      
      myName = name;
      isJoined = true;
      document.getElementById('joinBtn').disabled = true;
      document.getElementById('joinBtn').innerHTML = '<span class="animate-spin">??????...</span>';
      
      setTimeout(function() {
        document.getElementById('joinForm').style.display = 'none';
        document.getElementById('joinSuccessCard').style.display = 'block';
        document.getElementById('joinWelcomeText').textContent = '?????' + name + '??';
      }, 500);
    }

    function initAdminUI() {
      document.getElementById('loadingPage').style.display = 'none';
      document.getElementById('adminPage').style.display = 'block';
      updateAdminUI();
    }

    function updateAdminUI() {
      document.getElementById('displayMaxNumber').textContent = maxNumber;
      document.getElementById('maxNumber').value = maxNumber;
      document.getElementById('maxSlider').value = maxNumber;
      document.getElementById('fixed1').value = fixedUsers['1'];
      document.getElementById('fixed2').value = fixedUsers['2'];
      
      updateAdminUserList();
      updateAdminProgress();
      generateQRCode();
    }

    function updateAdminUserList() {
      const list = document.getElementById('userList');
      if (users.length === 0) {
        list.innerHTML = '<p style="text-align: center; color: #9ca3af; padding: 15px 0;">???????</p>';
        return;
      }
      list.innerHTML = users.map(function(user) {
        return '<div class="user-item"><span>' + user.name + (user.isAdmin ? '<span class="admin-badge">?????</span>' : '') + '</span></div>';
      }).join('');
    }

    function updateAdminProgress() {
      const count = users.length;
      const percentage = (count / maxNumber) * 100;
      document.getElementById('userCount').textContent = count + ' / ' + maxNumber;
      document.getElementById('progressFill').style.width = percentage + '%';
      document.getElementById('progressText').textContent = count >= maxNumber ? '???????????' : '???? ' + (maxNumber - count) + ' ?????';
      
      const drawBtn = document.getElementById('drawBtn');
      if (count >= maxNumber) {
        drawBtn.disabled = false;
        drawBtn.innerHTML = '<span>??????</span>';
      } else {
        drawBtn.disabled = true;
        drawBtn.innerHTML = '<span>???? ' + (maxNumber - count) + ' ?????</span>';
      }
    }

    function showJoinPage() {
      document.getElementById('loadingPage').style.display = 'none';
      document.getElementById('joinPage').style.display = 'block';
    }

    function updateJoinUI() {
      document.getElementById('joinUserCount').textContent = users.length + ' / ' + maxNumber;
      document.getElementById('joinProgressFill').style.width = (users.length / maxNumber * 100) + '%';
      document.getElementById('joinProgressText').textContent = users.length >= maxNumber ? '???????????' : '???? ' + (maxNumber - users.length) + ' ????????';

      const userListEl = document.getElementById('joinUserList');
      if (users.length === 0) {
        userListEl.innerHTML = '<p style="text-align: center; color: #9ca3af; padding: 15px 0;">?????????</p>';
      } else {
        userListEl.innerHTML = users.map(function(user) {
          return '<div class="user-item"><span>' + user.name + (user.isAdmin ? '<span class="admin-badge">?????</span>' : '') + '</span>' + (user.name === myName ? '<span style="color: #10b981; font-size: 12px;">??????</span>' : '') + '</div>';
        }).join('');
      }

      if (results.length > 0) {
        document.getElementById('statusTitle').textContent = '???????';
        document.getElementById('statusDesc').textContent = '????????';
        document.getElementById('joinForm').style.display = 'none';
        
        const myResult = results.find(function(r) {
          const user = users.find(function(u) { return u.id === r.userId; });
          return user && user.name === myName;
        });
        
        if (myResult) {
          document.getElementById('joinWelcomeText').textContent = '???????#' + myResult.number;
          document.getElementById('joinSuccessCard').style.display = 'block';
        }
      }
    }

    function renderResultList() {
      const list = document.getElementById('resultList');
      if (results.length === 0) {
        list.innerHTML = '<div class="empty-state"><div class="icon">???</div><p>??????????????</p></div>';
        return;
      }
      list.innerHTML = results.map(function(result) {
        const user = users.find(function(u) { return u.id === result.userId; });
        return '<div class="result-item' + (result.isFixed ? ' fixed' : '') + '"><div class="result-badge">' + result.number + '</div><div style="flex: 1;"><p>' + (user ? user.name : '¦Ä?') + '</p>' + (result.isFixed ? '<span style="font-size: 10px; color: #d97706; background: #fef3c7; padding: 2px 6px; border-radius: 4px;">???</span>' : '') + '</div></div>';
      }).join('');
    }

    function generateQRCode() {
      const link = window.location.origin + window.location.pathname + '?join=' + sessionId;
      document.getElementById('shareLink').value = link;
      const encoded = encodeURIComponent(link);
      document.getElementById('qrCode').innerHTML = '<img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=' + encoded + '" alt="?????">';
    }

    function copyLink() {
      const link = document.getElementById('shareLink').value;
      navigator.clipboard.writeText(link).then(function() { alert('??????????'); });
    }

    function switchTab(tab) {
      document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
      document.querySelectorAll('.page').forEach(function(p) { p.classList.remove('active'); });
      
      if (tab === 'settings') {
        document.querySelector('.tab:nth-child(1)').classList.add('active');
        document.getElementById('settingsPage').classList.add('active');
      } else {
        document.querySelector('.tab:nth-child(2)').classList.add('active');
        document.getElementById('drawPage').classList.add('active');
        updateAdminUI();
      }
    }

    function updateMaxNumber() {
      const input = document.getElementById('maxNumber');
      const num = parseInt(input.value, 10);
      if (num < 2) { alert('??§ł??2'); input.value = '2'; return; }
      if (num > 50) { alert('?????50'); input.value = '50'; return; }
      saveSettings();
    }

    function syncSlider() {
      const slider = document.getElementById('maxSlider');
      const input = document.getElementById('maxNumber');
      input.value = slider.value;
      saveSettings();
    }

    document.getElementById('userInput')?.addEventListener('keypress', function(e) { if (e.key === 'Enter') addUser(); });
    document.getElementById('joinUserName')?.addEventListener('keypress', function(e) { if (e.key === 'Enter') joinDrawing(); });
  </script>
</body>
</html>
